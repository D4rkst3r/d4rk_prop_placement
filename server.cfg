{{serverEndpoints}}
sv_licenseKey "{{svLicense}}"
sv_maxclients {{maxClients}}

sv_hostname "{{serverName}} | Prop Placement Server"
sets sv_projectName "{{serverName}}"
sets sv_projectDesc "{{recipeDescription}}"
sets locale "de-DE"
sets tags "roleplay, qbx, prop-placement"

set mysql_connection_string "{{dbConnectionString}}"

set onesync on
set sv_enforceGameBuild 2944

add_ace group.admin command allow
add_ace group.admin command.quit deny
add_ace group.admin prop_placement.admin allow
add_ace group.superadmin command allow
add_ace group.superadmin command.quit deny
add_ace group.superadmin prop_placement.admin allow
add_ace resource.qbx_core command allow
add_ace resource.oxmysql command allow

{{addPrincipalsMaster}}

ensure [cfx-default]
ensure oxmysql
ensure ox_lib
ensure ox_inventory
ensure ox_target
ensure qbx_core
ensure prop_placement
